    const container = document.getElementById('qa-container');
    const searchInput = document.getElementById('search');

    function render(filterText = '') {
        container.innerHTML = '';
        const filtered = data.filter(item => 
            item.question.includes(filterText) || 
            item.tags.some(t => t.includes(filterText)) ||
            item.category.includes(filterText)
        );

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="q-header">
                    <span class="category">${item.category}</span>
                    <p class="question">${item.question}</p>
                </div>
                <div class="logic-box">
                    <span class="label">【底層邏輯】</span>
                    <div>${item.logic}</div>
                </div>
                <div class="suggestion-box">
                    <span class="label">【實操建議】</span>
                    <div style="white-space: pre-line;">${item.suggestion}</div>
                </div>
                <div class="tags">
                    ${item.tags.map(t => `<span class="tag-item">#${t}</span>`).join('')}
                </div>
            `;
            container.appendChild(card);
        });
    }

    searchInput.addEventListener('input', (e) => render(e.target.value));
    render(); // 初始渲染
</script>
